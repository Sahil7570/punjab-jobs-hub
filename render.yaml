services:
  - type: web
    name: punjab-jobs-hub-api
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false        # Set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAIL
        sync: false        # Set this manually
      - key: ADMIN_PASSWORD
        sync: false        # Set this manually
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false        # Set this manually
      - key: EMAIL_PASS
        sync: false        # Set this manually
      - key: EMAIL_FROM
        sync: false        # Set this manually
      - key: FRONTEND_URL
        sync: false        # Set to your Vercel URL
